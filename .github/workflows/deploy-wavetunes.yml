name: Deploy WaveTunes

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-wavetunes]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout WaveTunes app
        uses: actions/checkout@v4
        with:
          repository: pa-legg/web-camera-music-instrument
          path: app

      - name: Build WaveTunes
        working-directory: app
        run: |
          npm ci
          npm run build
        env:
          VITE_BASE_PATH: /resources/web-camera-musical-instrument/

      - name: Copy build into site resources
        run: |
          rm -rf resources/web-camera-musical-instrument
          mkdir -p resources/web-camera-musical-instrument
          cp -r app/dist/* resources/web-camera-musical-instrument/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/web-camera-musical-instrument
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy WaveTunes to resources/web-camera-musical-instrument"
          git push
