  sections:
    Experience:
      - company: University of the West of England (UWE Bristol)
        position: Professor of Cyber Security
        location: Bristol, UK
        start_date: 2022-01-01
        end_date: present
        highlights:
          - "Full Professor in Cyber Security in recognition of 'Advancing Teaching and Learning' and for 'Research with Impact'."
          - "Successful research grant income with over £2.1M directed awarded from external funding sources, and over £3.7M in total (see projects page for futher details)."
          - "Published 90+ academic articles as of April 2026, in high-quality journals and conference venues (see publications page for further details)."
          - "Supervision of PhD student research (4 completions, 6 current, March 2026), as well as supporting post-doctoral research fellows (2 former, 2 current, March 2026) (see projects page for further details)."
          - "Experience of supervising 100+ student research projects across undergraduate and postgraduate level, as well as supporting extra curricula paid student research and consultancy work (see projects page for further details)."
          - "Leading outreach initiatives and upskilling educators and industry professionals in cyber security (see teaching page for further details)."

      - company: University of the West of England (UWE Bristol)
        position: "Co-Director of UWEcyber Academic Centre of Excellence in Cyber Security Education (NCSC Certified)"
        location: Bristol, UK
        start_date: 2020-10-01
        end_date: present
        highlights:
          - "Co-Director of UWEcyber 'Gold' NCSC Academic Centre of Excellence in Cyber Security Education (ACE-CSE) that brings together our teaching and learning, external engagement, outreach, research and knowledge exchange in Cyber Security, with a multi-disciplinary perspective involving staff across the entire University, a regional network of educators with a passion to upskill cyber security education, and a regular guest speaker seminar series that has attracted presenters from across the globe."

      - company: University of the West of England (UWE Bristol)
        position: "Programme Leadership Team BSc Cyber Security and Digital Forensics"
        location: Bristol, UK
        start_date: 2024-07-01
        end_date: present
        highlights:
          - "I joined the BSc Cyber Security and Digital Forensics programme leadership team in 2024, to support and mentor a new leadership team, and to further promote opportunities of external industry engagement for our undergraduate students, including the continued organisation of guest speakers as well as new industry collaboration with teaching."

      - company: University of the West of England (UWE Bristol)
        position: "CSRC Cyber Security Research Theme Lead"
        location: Bristol, UK
        start_date: 2019-08-01
        end_date: present
        highlights:
          - "The Computer Science Research Centre (CSRC) at UWE is made up of 5 themes: Artificial Intelligence, Cyber Security, Data Science, Expressive Computer Interaction, and Smart Cities. I serve as Cyber Security Research Theme Lead since the reorganisation of the CSRC in 2019, supporting academic staff and PhD researchers to develop cyber security research across infrastructure security, software security, AI/data security, and cyber crime domains."

      - company: University of the West of England (UWE Bristol)
        position: "Programme Leader MSc Cyber Security (NCSC Certified)"
        location: Bristol, UK
        start_date: 2018-01-01
        end_date: 2024-07-31
        highlights:
          - "Former Programme Leader of the NCSC-Certified MSc Cyber Security, having grown the programme from its initial delivery for 13 students in 2018 to as many as 150 students across two intakes in an academic year, and achieving a PTES overall student satisfaction score of 92% (2024)."

      - company: University of the West of England (UWE Bristol)
        position: "Associate Professor of Cyber Security"
        location: Bristol, UK
        start_date: 2018-09-30
        end_date: 2022-01-01

      - company: University of the West of England (UWE Bristol)
        position: "Senior Lecturer in Computer Science"
        location: Bristol, UK
        start_date: 2015-02-09
        end_date: 2018-09-30

      - company: Cabinet Office
        position: "Member of the UK Government Cyber Advisory Board (GCAB)"
        location: London, UK
        start_date: 2025-03-01
        end_date: present

      - company: CSE Connect
        position: "Co-Founder / Co-Director"
        location: UK
        start_date: 2019-07-01
        end_date: present
        highlights:
          - "A National Cyber Security Education network to bring together academia, industry and government. Supported by the UK National Cyber Security Centre, the network hosts regular events as well as an annual conference, that promotes collaboration and sharing to enhance cyber security education, both within the UK and working with global partners. (Formerly CISSEUK, a UK chapter of CISSE, the Colloquium of Information Systems Security Education)"

      - company: University of Oxford
        position: "Post Doctoral Research Associate"
        location: Oxford, UK
        start_date: 2013-03-20
        end_date: 2015-02-09
        highlights:
          - "Cyber Security Centre, Department of Computer Science"
          - "Research project: 'Corporate Insider Threat Detection (CITD)' funded by the Centre for the Protection of National Infrastructure (CPNI)."
          - "Lectureship post at St. Catherine College, teaching Computer Graphics."
          - "Lectureship post at Worcester College, tutoring International students in Computer Graphics"
          - "Teaching at the Department of Computer Science includes classes for the Visual Analytics postgraduate course, and both tutorials and practical labs for the Computer Graphics course."
          - "Supervision of postgraduate projects in the Centre for Doctoral Training in Cyber Security"


      - company: Swansea University
        position: "Post Doctoral Research Assistant"
        location: Swansea, UK
        start_date: 2010-07-01
        end_date: 2013-03-20
        highlights:
          - "Department of Computer Science"
          - "Research project: 'Sports Video Visualization' funded by the Welsh Assembly Government."
          - "Guest lecturer on iOS Software Development and Sports Video Visualisation"
          - "'Inspirational Speaker' and iOS Schools Workshop Lead for Technocamps Wales."
          - "Supervision of undergraduate and postgraduate projects."

      - company: Freelance
        position: "Software Developer"
        location: UK
        start_date: 2010-05-01
        end_date: 2015-02-09
        highlights:
          - "Desktop and Mobile (iOS, Android, Blackberry) development."
          - "Over 40,000 paid downloads on the iOS App Store worldwide since July 2011, with Tide Times being recognised in the Stuff magazine '200 best apps of all time', and also achieving #1 in the 'Top Paid Weather' category (Summer 2011)."
          - "PocketCoder used by top sports clubs worldwide including Manchester United FC, Welsh Rugby Union, Ireland RFU, Barnsley FC, Bolton FC, QPR, and the Football Association."
          - "Desktop software includes collaborative development with University Hospital Wales and NHS, producing a 3D stereoscopic imaging system for ophthalmic clinical assessment based on PhD research."
          - "Proficient in variety of development languages: Python, Javascript, Java, C++, C#, Objective-C, Swift."

      - company: Cardiff University
        position: "Software Developer"
        location: UK
        start_date: 2010-04-01
        end_date: 2010-07-01
        highlights:
          - "Development of research-led Android mobile application, GeoCaption."
    
