          - "Co-Director of UWEcyber 'Gold' NCSC Academic Centre of Excellence in Cyber Security Education (ACE-CSE) that brings together teaching, research, outreach and knowledge exchange in Cyber Security, with a multi-disciplinary perspective involving staff across the entire University, a regional network of educators, and a regular guest speaker seminar series that has attracted presenters from across the globe."

