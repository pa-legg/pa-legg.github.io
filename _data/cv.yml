      - company: University of the West of England (UWE Bristol)
        position: "CSRC Cyber Security Research Theme Lead"
        location: Bristol, UK
        start_date: 2019-08-01
        end_date: Present
        highlights:
          - "The Computer Science Research Centre (CSRC) at UWE is made up of 5 themes: Artificial Intelligence, Cyber Security, Data Science, Expressive Computer Interaction, and Smart Cities. I serve as Cyber Security Research Theme Lead since the reorganisation of the CSRC in 2019, supporting academic staff and PhD researchers to develop cyber security research across infrastructure security, software security, AI/data security, and cyber crime domains."

