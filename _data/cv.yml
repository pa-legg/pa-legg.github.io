    Experience:
      - company: University of the West of England (UWE Bristol)
        position: Professor of Cyber Security
        location: Bristol, UK
        start_date: 2022
        end_date: Present
        highlights:
          - "Full Professor in Cyber Security in recognition of 'Advancing Teaching and Learning' (primary domain) and for 'Research with Impact' (secondary domain)."
          - "Successful research grant income with over £2.1M directed awarded from external funding sources, and over £3.7M in total (see projects page for futher details)."
          - "Published 85+ academic articles as of March 2026, in high-quality journals and conference venues (see publications page for further details)."
          - "Supervision of PhD student research (4 completions, 6 current - March 2026), as well as supporting post-doctoral research fellows (2 former, 2 current - March 2026) (see projects page for further details)."
          - "Experience of supervising 100+ student research projects across undergraduate and postgraduate level, as well as supporting extra curricula paid student research and consultancy work (see projects page for further details)."
          - "Leading outreach initiatives and upskilling educators and industry professionals in cyber security (see teaching page for further details)."

      - company: University of the West of England (UWE Bristol)
        position: "Co-Director of UWEcyber Academic Centre of Excellence in Cyber Security Education (NCSC Certified)"
        location: Bristol, UK
        start_date: 2020-10-01
        end_date: Present
        highlights:
          - "Co-Director of UWEcyber 'Gold' NCSC Academic Centre of Excellence in Cyber Security Education (ACE-CSE) that brings together teaching, research, outreach and knowledge exchange in Cyber Security, with a multi-disciplinary perspective involving staff across the entire University, a regional network of educators, and a regular guest speaker seminar series that has attracted presenters from across the globe."

      - company: University of the West of England (UWE Bristol)
        position: "Programme Leadership Team - BSc Cyber Security and Digital Forensics"
        location: Bristol, UK
        start_date: 2024-07-01
        end_date: Present
        highlights:
          - "I joined the BSc Cyber Security and Digital Forensics programme leadership team in 2024, to support and mentor a new leadership team, and to further promote opportunities of external industry engagement for our undergraduate students, including the continued organisation of guest speakers as well as new industry collaboration with teaching."

      - company: University of the West of England (UWE Bristol)
        position: "CSRC Cyber Security Research Theme Lead"
        location: Bristol, UK
        start_date: 2019-08-01
        end_date: Present
        highlights:
          - "The Computer Science Research Centre (CSRC) at UWE is made up of 5 themes: Artificial Intelligence, Cyber Security, Data Science, Expressive Computer Interaction, and Smart Cities. I serve as Cyber Security Research Theme Lead since the reorganisation of the CSRC in 2019, supporting academic staff and PhD researchers to develop cyber security research across infrastructure security, software security, AI/data security, and cyber crime domains."

      - company: University of the West of England (UWE Bristol)
        position: "Programme Leader - MSc Cyber Security (NCSC Certified)"
        location: Bristol, UK
        start_date: 2018-01-01
        end_date: 2024-07-31
        highlights:
          - "Former Programme Leader of the NCSC-Certified MSc Cyber Security, having grown the programme from its initial delivery for 13 students in 2018 to as many as 150 students across two intakes in an academic year, and achieving a PTES overall student satisfaction score of 92% (2024)."

