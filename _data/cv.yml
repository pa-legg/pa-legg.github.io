      - company: CSE Connect
        position: "Co-Founder / Co-Director"
        location: UK
        start_date: 2019-07-01
        end_date: Present
        highlights:
          - "A National Cyber Security Education network to bring together academia, industry and government. Supported by the UK National Cyber Security Centre, the network hosts regular events as well as an annual conference, that promotes collaboration and sharing to enhance cyber security education, both within the UK and working with global partners. (Formerly CISSEUK, a UK chapter of CISSE - the Colloquium of Information Systems Security Education)"

