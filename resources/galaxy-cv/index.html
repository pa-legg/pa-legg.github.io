<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galaxy Gesture</title>
    <script type="module" crossorigin src="/resources/galaxy-cv/assets/index-g8Pd_9IL.js"></script>
    <link rel="stylesheet" crossorigin href="/resources/galaxy-cv/assets/index-BemvB_vM.css">
  </head>
  <body>
    <div id="app">
      <canvas id="galaxy-canvas"></canvas>
      <video id="webcam" autoplay playsinline muted></video>
      <div id="hud">
        <div id="hud-header">
          <h1>Galaxy Gesture</h1>
          <button id="hud-toggle" type="button" aria-label="Minimize panel">−</button>
        </div>
        <div id="hud-body">
          <p id="gesture-label">Show your hand to the camera</p>
          <form id="text-settings">
            <p class="settings-title">Custom text for each gesture</p>
            <label class="text-field">
              <span>1 finger</span>
              <input id="text-1" type="text" maxlength="24" autocomplete="off" />
            </label>
            <label class="text-field">
              <span>2 fingers</span>
              <input id="text-2" type="text" maxlength="24" autocomplete="off" />
            </label>
            <label class="text-field">
              <span>3 fingers</span>
              <input id="text-3" type="text" maxlength="24" autocomplete="off" />
            </label>
            <label class="text-field">
              <span>4 fingers</span>
              <input id="text-hurrah" type="text" maxlength="24" autocomplete="off" />
            </label>
            <div class="settings-actions">
              <button type="submit">Apply</button>
              <button type="reset">Reset</button>
            </div>
          </form>
          <ul>
            <li><strong>Fist</strong> — orbiting space dust</li>
            <li><strong>1 / 2 / 3 / 4 fingers</strong> — form your custom text</li>
          </ul>
        </div>
      </div>
      <div id="loading">Loading hand tracking&hellip;</div>
    </div>
  </body>
</html>
